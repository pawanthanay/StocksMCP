services:
  - type: web
    name: stocksmcp-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.web_dashboard:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: WEB_DASHBOARD_RELOAD
        value: "false"
